name: API Automation CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    name: Run API Tests
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Setup Java (for Allure)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Install Allure CLI
        run: npm install -g allure-commandline --save-dev
      
      - name: Create .env file
        run: |
          echo "BASE_URL=${{ secrets.BASE_URL || 'https://reqres.in/api' }}" >> .env
          echo "REQRES_API_KEY=${{ secrets.REQRES_API_KEY }}" >> .env
      
      - name: Run Cucumber Tests
        run: npm test
        continue-on-error: true
      
      - name: Generate Allure Report
        if: always()
        run: |
          allure generate allure-results --clean -o allure-report
      
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-node-${{ matrix.node-version }}
          path: allure-results/
          retention-days: 30
      
      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-node-${{ matrix.node-version }}
          path: allure-report/
          retention-days: 30
      
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-node-${{ matrix.node-version }}
          path: test-results/
          retention-days: 30
      
      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-node-${{ matrix.node-version }}
          path: logs/
          retention-days: 7
      
      - name: Publish Allure Report to GitHub Pages
        if: always() && github.ref == 'refs/heads/main' && matrix.node-version == '20.x'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages
          destination_dir: allure-report
      
      - name: Comment PR with Test Results
        if: always() && github.event_name == 'pull_request' && matrix.node-version == '20.x'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const allureReport = fs.existsSync('allure-report/widgets/summary.json') 
              ? JSON.parse(fs.readFileSync('allure-report/widgets/summary.json', 'utf8'))
              : null;
            
            let comment = '## 🧪 Test Results\n\n';
            
            if (allureReport) {
              const { statistic } = allureReport;
              const total = statistic.total || 0;
              const passed = statistic.passed || 0;
              const failed = statistic.failed || 0;
              const broken = statistic.broken || 0;
              const skipped = statistic.skipped || 0;
              
              comment += `| Status | Count |\n`;
              comment += `|--------|-------|\n`;
              comment += `| ✅ Passed | ${passed} |\n`;
              comment += `| ❌ Failed | ${failed} |\n`;
              comment += `| 🔥 Broken | ${broken} |\n`;
              comment += `| ⏭️ Skipped | ${skipped} |\n`;
              comment += `| 📊 Total | ${total} |\n\n`;
              
              const passRate = total > 0 ? ((passed / total) * 100).toFixed(2) : 0;
              comment += `**Pass Rate:** ${passRate}%\n\n`;
            } else {
              comment += '⚠️ Test results not available\n\n';
            }
            
            comment += `**Node.js Version:** ${{ matrix.node-version }}\n`;
            comment += `**Commit:** ${context.sha.substring(0, 7)}\n`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint
        run: npm run lint || echo "ESLint not configured"
        continue-on-error: true
